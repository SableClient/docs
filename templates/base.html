<!doctype html>
<html lang="en">

		<head>
				<meta charset="utf-8">
				<meta name="viewport" content="width=device-width, initial-scale=1">
				<title>{%- block title -%}{{ config.title }}{%- endblock -%}</title>
				<script>document.documentElement.classList.add('js');</script>
				<script type="module" blocking="render" src="{{ get_url(path="js/site.js") }}"></script>
				<link rel="stylesheet" href="{{ get_url(path="main.css", cachebust=true) }}">
				<meta name="generator" content="Zola">

				{#- TODO: add canonical links, opengraph, etc. -#}
		</head>

		<body>
				<a class="skip-link" href="#content">Skip to content</a>
				<button class="nav-toggle-button" type="button" aria-expanded="false" aria-controls="docs-nav" aria-label="Browse docs">
						<span class="nav-toggle-icon" aria-hidden="true">
								<span></span>
								<span></span>
								<span></span>
						</span>
						<span class="sr-only">Browse docs</span>
				</button>
				<div class="nav-overlay" hidden></div>
				<main id="main">
						<nav class="nav" id="docs-nav" aria-label="Documentation">
								{% filter indent -%}{%- filter indent -%}
								{%- block nav -%}
								{% include "partials/nav.html" %}
								{%- endblock -%}
								{%- endfilter -%}{%- endfilter %}
						</nav>
						<article id="content" tabindex="-1">
								{%- block content -%}{%- endblock -%}
						</article>
				</main>
		</body>
</html>
